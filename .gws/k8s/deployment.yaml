apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-echo
  namespace: go-echo
  labels:
    app: go-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-echo
  template:
    metadata:
      labels:
        app: go-echo
    spec:
      containers:
      - name: go-echo
        image: go-echo
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
      restartPolicy: Always
